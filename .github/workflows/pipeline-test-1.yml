name: Demo - Carbon Tracking

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  carbon-demo:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Simulate CI tasks
        run: |
          echo "🔧 Running CI pipeline..."
          echo "Step 1: Install dependencies"
          sleep 10
          
          echo "Step 2: Run tests"
          sleep 15
          
          echo "Step 3: Build application"
          sleep 20
          
          echo "Step 4: Deploy artifacts"
          sleep 10
          
          echo "✅ Pipeline complete!"
      
      - name: Generate test report
        run: |
          echo "Generating test coverage report..."
          sleep 5
          echo "Coverage: 85%"
      
      - name: Run linter
        run: |
          echo "Running code quality checks..."
          sleep 5
          echo "No issues found!"
      
      - name: Summary
        run: |
          echo "================================"
          echo "Demo Workflow Complete"
          echo "Duration: ~65 seconds"
          echo "Carbon: ~2-3g CO₂"
          echo "================================"
